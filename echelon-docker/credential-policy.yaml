# Echelon Credential Isolation Policy
# No .env files mounted into containers. All keys via -e flags.

services:
  builder:
    env_vars:
      - GH_TOKEN          # GitHub API token
    forbidden:
      - .env
      - credentials
      - secrets
      - *.key

  reviewer:
    env_vars:
      - GH_TOKEN
      - LLM_PROXY_URL     # Route to Privacy Router
    forbidden:
      - .env
      - credentials
      - secrets
      - *.key

  privacy-router:
    env_vars:
      - DEEPSEEK_API_KEY  # Backend LLM API keys
      - WAFER_API_KEY
    secrets: []
    # Keys never written to disk; injected at runtime
