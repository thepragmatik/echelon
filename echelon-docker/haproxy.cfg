global
  daemon
  maxconn 256

defaults
  mode http
  timeout connect 5000ms
  timeout client 50000ms
  timeout server 50000ms

frontend llm-proxy
  bind *:8080
  use_backend deepseek if { path_beg /v1/chat/completions } { hdr(X-Provider) -i deepseek }
  use_backend glm if { path_beg /v1/chat/completions } { hdr(X-Provider) -i glm }
  default_backend deepseek

backend deepseek
  server api api.deepseek.com:443 ssl verify required

backend glm
  server api pass.wafer.ai:443 ssl verify required
