name: Docker Build
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: echelon-docker
          file: echelon-docker/Dockerfile.builder
          push: ${{ github.event_name != "pull_request" }}
          tags: ghcr.io/${{ github.repository }}/builder:latest
      - name: Build and push reviewer image
        uses: docker/build-push-action@v6
        with:
          context: echelon-docker
          file: echelon-docker/Dockerfile.reviewer
          push: ${{ github.event_name != "pull_request" }}
          tags: ghcr.io/${{ github.repository }}/reviewer:latest
